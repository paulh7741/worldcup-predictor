name: World Cup Predictor – Auto Update

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub website

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictor
        env:
          WC_FOOTBALL_API_KEY: ${{ secrets.WC_FOOTBALL_API_KEY }}
          WC_EMAIL_SENDER:     ${{ secrets.WC_EMAIL_SENDER }}
          WC_EMAIL_PASSWORD:   ${{ secrets.WC_EMAIL_PASSWORD }}
          WC_EMAIL_RECIPIENT:  ${{ secrets.WC_EMAIL_RECIPIENT }}
          WC_GITHUB_TOKEN:     ${{ secrets.GH_PAT }}
          WC_GITHUB_REPO:      worldcup-predictor
        run: python3 wc_predictor.py --no-save

      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc_state.json || true
          git diff --staged --quiet || git commit -m "chore: update state $(date '+%d %b %Y %H:%M UTC')"
          git push
